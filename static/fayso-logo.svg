<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 48" role="img" aria-label="FaySo logo">
  <defs>
    <linearGradient id="orbA" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="orbB" x1="8" y1="4" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .wordmark-light {
      display: inline;
      fill: #162031;
    }
    .wordmark-dark {
      display: none;
      fill: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      .wordmark-light {
        display: none;
      }
      .wordmark-dark {
        display: inline;
      }
    }
  </style>

  <!-- New icon: orbital ring with comet spark -->
  <g transform="translate(0,0)">
    <circle cx="24" cy="24" r="17" fill="none" stroke="url(#orbA)" stroke-width="4" opacity="0.95" />
    <path d="M10 26c5 8 18 9 26 1" fill="none" stroke="url(#orbB)" stroke-width="4" stroke-linecap="round" />
    <circle cx="34" cy="14" r="3.2" fill="#67e8f9" filter="url(#softGlow)" />
    <path d="M16 15c2-3 6-5 10-5" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
  </g>

  <!-- Wordmark: fully new typographic treatment -->
  <g transform="translate(56,0)">
    <text x="0" y="31" font-family="Segoe UI, Inter, sans-serif" font-size="28" font-weight="800" letter-spacing="0.2" class="wordmark-light" stroke="#ffffff" stroke-opacity="0.25" stroke-width="0.35">FaySo</text>
    <text x="0" y="31" font-family="Segoe UI, Inter, sans-serif" font-size="28" font-weight="800" letter-spacing="0.2" class="wordmark-dark" stroke="#020617" stroke-opacity="0.35" stroke-width="0.35">FaySo</text>
    <rect x="2" y="35" width="62" height="3" rx="2" fill="url(#orbA)" opacity="0.9" />
  </g>
</svg>
